name: Daily job dashboard update

on:
  schedule:
    # 6:00 AM IST every day (00:30 UTC)
    - cron: '30 0 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'web-static/jobs.json'
      - 'job_output.json'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Scrape jobs (free JobSpy — no Apify credits)
        env:
          SCRAPER_BACKEND: free
        run: |
          python job_scraper_enhanced.py || echo "Scrape failed — export will use seed data"

      - name: Export jobs.json for website
        run: python scripts/export_jobs_for_web.py

      - name: Commit updated jobs to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web-static/jobs.json job_output.json 2>/dev/null || git add web-static/jobs.json
          git diff --staged --quiet || git commit -m "chore: update jobs [skip ci]"
          git push || echo "Nothing to push or push skipped"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload site (web-static)
        uses: actions/upload-pages-artifact@v3
        with:
          path: web-static

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
